[fish-ai]
configuration = qwen
keymap_1 = ctrl-_
keymap_2 = alt-/

[deepseek]
provider = deepseek
api_key = $DEEPSEEK_API_KEY
model = deepseek-chat

[qwen]
# When `provider = openai`, fish-ai ignores `api_base` entirely and always connects
# to `api.openai.com`. Need to set `provider = self-hosted` instead, which uses
# the `server` config key
provider = self-hosted
server = https://idealab.alibaba-inc.com/api/openai/v1
api_key = $IDEALAB_API_KEY
model = qwen3-max
